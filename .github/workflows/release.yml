name: Draft Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      APP_BUILD_PROFILE: public
      GITHUB_BUILD_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
      - name: Pin npm and print toolchain
        run: |
          npm install --global npm@11.6.2
          node --version
          npm --version
      - name: Require tag/package version match
        shell: powershell
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag/package version mismatch: v$version != ${{ github.ref_name }}" }
      - run: npm ci
      - name: Verify and package unsigned Windows artifacts
        shell: powershell
        run: .\scripts\package-win.ps1 -ReleaseArtifactsOnly
      - name: Public artifact scan
        shell: powershell
        run: .\scripts\check-public-safety.ps1 -ArtifactPath release
      - name: Upload workflow artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: grok-build-desktop-${{ github.ref_name }}-x64
          path: |
            release/Grok-Build-Desktop-Setup-*.exe
            release/Grok-Build-Desktop-Portable-*.zip
            release/SHA256SUMS.txt
            release/*SBOM*.json
            release/THIRD_PARTY_LICENSES.json
          if-no-files-found: error
      - name: Attest installer
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/Grok-Build-Desktop-Setup-*.exe
      - name: Attest portable archive
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release/Grok-Build-Desktop-Portable-*.zip
      - name: Create draft release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --draft --verify-tag --title "Grok Build Desktop ${{ github.ref_name }}" --notes-file CHANGELOG.md `
            release/Grok-Build-Desktop-Setup-*.exe `
            release/Grok-Build-Desktop-Portable-*.zip `
            release/SHA256SUMS.txt `
            release/*SBOM*.json `
            release/THIRD_PARTY_LICENSES.json

  download-verify-and-publish:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 35
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
      - name: Download assets back from the draft release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force downloaded | Out-Null
          gh release download "${{ github.ref_name }}" --dir downloaded
      - name: Verify SHA-256 manifest and provenance
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $lines = Get-Content downloaded\SHA256SUMS.txt | Where-Object { $_ -match '^([0-9a-fA-F]{64})\s+(.+)$' }
          if ($lines.Count -lt 4) { throw 'SHA256SUMS.txt is missing release assets.' }
          foreach ($line in $lines) {
            $null = $line -match '^([0-9a-fA-F]{64})\s+(.+)$'
            $expected = $Matches[1].ToLowerInvariant()
            $asset = Join-Path downloaded $Matches[2].Trim()
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf)) { throw "Asset listed in SHA256SUMS.txt is missing: $asset" }
            $actual = ([BitConverter]::ToString([Security.Cryptography.SHA256]::Create().ComputeHash([IO.File]::ReadAllBytes($asset)))).Replace('-', '').ToLowerInvariant()
            if ($actual -ne $expected) { throw "SHA-256 mismatch: $asset" }
          }
          $setup = Get-ChildItem downloaded\Grok-Build-Desktop-Setup-*.exe | Select-Object -First 1
          $portable = Get-ChildItem downloaded\Grok-Build-Desktop-Portable-*.zip | Select-Object -First 1
          gh attestation verify $setup.FullName --repo "${{ github.repository }}"
          gh attestation verify $portable.FullName --repo "${{ github.repository }}"
      - name: Publish verified release as Latest
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest
