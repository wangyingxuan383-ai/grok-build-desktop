name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Pin npm and print toolchain
        run: |
          npm install --global npm@11.6.2
          node --version
          npm --version
      - name: Install dependencies
        run: npm ci
      - name: Offline verification
        shell: powershell
        run: .\scripts\verify.ps1 -SkipInteractiveComputer
      - name: Build unpacked application and verify fuses
        shell: powershell
        run: |
          $env:APP_BUILD_PROFILE = 'public'
          npm run package:dir
          node scripts/verify-fuses.mjs "release\win-unpacked\Grok Build Desktop.exe"
          .\scripts\check-public-safety.ps1 -ArtifactPath release

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
