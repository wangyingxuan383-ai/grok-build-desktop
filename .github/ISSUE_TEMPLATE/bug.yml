name: Bug 报告
description: 报告可复现的问题；请先移除敏感数据
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **请勿上传 Token、API Key、OAuth 凭据、完整日志、真实会话、工作区源码或未脱敏截图。**
        优先从“兼容诊断中心”导出脱敏支持包，并在上传前再次检查。
  - type: input
    id: version
    attributes:
      label: 应用与 Grok CLI 版本
      placeholder: Grok Build Desktop 0.4.0 / Grok CLI x.y.z
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows 版本
      options: [Windows 10 22H2, Windows 11 23H2, Windows 11 24H2, 其他]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 使用假账号、假项目名和 `%USERPROFILE%` 路径。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际结果
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容不含凭据、私人会话、工作区文件或可识别个人信息。
          required: true
